<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Meter Production (Hourly)</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { padding: 20px; }
        th { background: #000; color: #fff; }
        table { font-size: 0.85rem; }
        .slot-col { width: 110px; text-align: center; }
        .qty-col { width: 90px; text-align: right; }
    </style>
</head>
<body>
<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">
            Meter Production (Hourly) – {{ today }}
        </h4>
        <form method="get" class="d-flex align-items-center">
            <label class="me-2">Plant:</label>
            <select name="plant" class="form-select form-select-sm"
                    onchange="this.form.submit()">
                {% for p in plant_names %}
                <option value="{{ p }}" {% if p == plant %}selected{% endif %}>{{ p }}</option>
                {% endfor %}
            </select>
        </form>
    </div>

    <h5>{{ plant }}</h5>

    <div style="max-height: 600px; overflow-y: auto;">
        <table class="table table-sm table-striped table-bordered mb-0">
            <thead>
            <tr>
                <th>ProjCode</th>
                <th>Line</th>
                <th class="slot-col">Hour Slot</th>
                <th class="qty-col">ProdQty</th>
            </tr>
            </thead>
            <tbody>
            {% for r in rows %}
            <tr>
                <td>{{ r.ProjCode }}</td>
                <td>{{ r.Line }}</td>
                <td class="slot-col">{{ r.Slot }}</td>
                <td class="qty-col">{{ r.ProdQty }}</td>
            </tr>
            {% endfor %}
            {% if rows|length == 0 %}
            <tr>
                <td colspan="4" class="text-center">No data for today.</td>
            </tr>
            {% endif %}
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
