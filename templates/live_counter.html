<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Live Meter Count</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      const key = "pd_theme";
      const saved = localStorage.getItem(key);
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>

  <style>
    :root {
      --bg: #eef2f7;
      --accent: #16a34a;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --accent-muted: #15803d;
      --text: #0f172a;
      --muted: #64748b;
      --bg-grad: radial-gradient(circle at top, #f8fbff 0, #eef2f7 45%, #e7edf6 100%);
      --top-bg: rgba(255, 255, 255, 0.92);
      --top-border: rgba(148, 163, 184, 0.45);
      --badge-bg: rgba(226, 232, 240, 0.9);
      --badge-border: rgba(148, 163, 184, 0.45);
      --num-bg: radial-gradient(circle at top, rgba(34, 197, 94, 0.15), transparent 60%);
      --num-border: rgba(22, 163, 74, 0.42);
      --num-glow: 0 0 36px rgba(34, 197, 94, 0.18), 0 0 80px rgba(22, 163, 74, 0.16) inset;
    }
    :root[data-theme="dark"] {
      --bg: #020617;
      --accent: #22c55e;
      --accent-soft: rgba(34, 197, 94, 0.12);
      --accent-muted: #4ade80;
      --text: #f9fafb;
      --muted: #9ca3af;
      --bg-grad: radial-gradient(circle at top, #0f172a 0, #020617 45%, #000 100%);
      --top-bg: rgba(15, 23, 42, 0.9);
      --top-border: rgba(148, 163, 184, 0.3);
      --badge-bg: rgba(15, 23, 42, 0.8);
      --badge-border: rgba(148, 163, 184, 0.4);
      --num-bg: radial-gradient(circle at top, rgba(34, 197, 94, 0.18), transparent 60%);
      --num-border: rgba(34, 197, 94, 0.5);
      --num-glow: 0 0 40px rgba(34, 197, 94, 0.22), 0 0 120px rgba(22, 163, 74, 0.3) inset;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg-grad);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .top-bar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      background: var(--top-bg);
      border-radius: 999px;
      border: 1px solid var(--top-border);
      backdrop-filter: blur(10px);
      font-size: 0.78rem;
      color: var(--muted);
      z-index: 10;
    }

    .top-bar strong {
      font-family: "DM Mono", monospace;
      color: var(--text);
      font-weight: 500;
    }

    .top-bar select {
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: "DM Mono", monospace;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .badge {
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--badge-bg);
      border: 1px solid var(--badge-border);
      font-family: "DM Mono", monospace;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .container {
      text-align: center;
      max-width: 720px;
    }

    .label {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: .24em;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .plant-label {
      font-size: 1rem;
      margin-bottom: 6px;
      color: var(--accent-muted);
      font-family: "DM Mono", monospace;
    }

    .big-number {
      font-family: "DM Mono", monospace;
      font-size: clamp(3.8rem, 8vw, 5.2rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      display: inline-flex;
      padding: 16px 32px;
      border-radius: 18px;
      background: var(--num-bg);
      border: 1px solid var(--num-border);
      box-shadow: var(--num-glow);
      position: relative;
      overflow: hidden;
    }

    .big-number span {
      display: inline-block;
      min-width: 0.6em;
      text-align: center;
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }

    .big-number.bump {
      animation: bump 0.4s ease-out;
    }

    @keyframes bump {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.04); }
      60%  { transform: scale(0.98); }
      100% { transform: scale(1); }
    }

    .meta {
      margin-top: 18px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .meta strong {
      color: var(--accent-muted);
      font-family: "DM Mono", monospace;
      font-weight: 500;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.8);
      animation: pulse 1.8s infinite;
      margin-right: 6px;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
      70%  { box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
      100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }

    .small {
      font-size: 0.76rem;
      margin-top: 8px;
      color: var(--muted);
    }

    .small a {
      color: var(--accent-muted);
      text-decoration: none;
    }

    .small a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="top-bar">
  <span class="badge">Live</span>
  <span>Plant:</span>
  <form id="plant-form">
    <select name="plant" id="plant-select">
      <option value="ALL" {% if plant == 'ALL' %}selected{% endif %}>ALL</option>
      {% for p in plant_names %}
      <option value="{{ p }}" {% if p == plant %}selected{% endif %}>{{ p }}</option>
      {% endfor %}
    </select>
  </form>
  <span>| Today: <strong>{{ today }}</strong></span>
</div>

<div class="container">
  <div class="label">Total meters produced today</div>
  <div class="plant-label" id="plant-label"></div>

  <div class="big-number" id="counter">
    <!-- digits injected via JS -->
  </div>

  <div class="meta">
    <div>
      <span class="pulse-dot"></span>
      Updating every <strong id="refresh-sec">30s</strong>
    </div>
    <div id="meta-time">Last updated: --</div>
  </div>

  <div class="small">
    View detailed hourly dashboard:
    <a href="{{ url_for('index') }}" target="_blank">open in new tab</a>
  </div>
</div>

<script>
  const AUTO_REFRESH_MS = 30000;
  const counterEl = document.getElementById("counter");
  const metaTimeEl = document.getElementById("meta-time");
  const refreshSecEl = document.getElementById("refresh-sec");
  const plantSelect = document.getElementById("plant-select");
  const plantForm = document.getElementById("plant-form");
  const plantLabel = document.getElementById("plant-label");
  if (refreshSecEl) refreshSecEl.textContent = `${Math.floor(AUTO_REFRESH_MS / 1000)}s`;

  let currentValue = 0;
  let currentPlant = plantSelect.value;

  function formatNumber(n) {
    return n.toLocaleString("en-IN");
  }

  function renderDigits(n) {
    const str = formatNumber(n);
    counterEl.innerHTML = "";
    for (const ch of str) {
      const span = document.createElement("span");
      span.textContent = ch;
      counterEl.appendChild(span);
    }
  }

  function animateTo(newValue) {
    if (newValue === currentValue) return;

    const start = currentValue;
    const diff = newValue - start;
    const duration = 450;
    const startTime = performance.now();

    counterEl.classList.add("bump");

    function tick(now) {
      const t = Math.min(1, (now - startTime) / duration);
      const eased = 1 - Math.pow(1 - t, 3);  // ease-out
      const val = Math.round(start + diff * eased);
      renderDigits(val);
      if (t < 1) requestAnimationFrame(tick);
      else setTimeout(() => counterEl.classList.remove("bump"), 80);
    }

    requestAnimationFrame(tick);
    currentValue = newValue;
  }

  function updatePlantLabel(data) {
    if (data.plant === "ALL") {
      plantLabel.textContent = "All plants combined";
    } else {
      plantLabel.textContent = "Plant: " + data.plant;
    }
  }

  async function fetchTotal() {
    try {
      const resp = await fetch(`/api/live_total?plant=${encodeURIComponent(currentPlant)}`, {
        cache: "no-store"
      });
      if (!resp.ok) return;
      const data = await resp.json();
      if (typeof data.total !== "number") return;

      updatePlantLabel(data);

      const total = data.total;
      const asOf = data.as_of || "";
      animateTo(total);
      metaTimeEl.textContent = "Last updated: " + asOf.replace("T", " ");
    } catch (e) {
      console.error("Error fetching live total", e);
    }
  }

  plantSelect.addEventListener("change", () => {
    currentPlant = plantSelect.value;
    const params = new URLSearchParams(window.location.search);
    params.set("plant", currentPlant);
    history.replaceState({}, "", `${location.pathname}?${params.toString()}`);
    currentValue = 0;
    renderDigits(0);
    fetchTotal();
  });

  // Initial state
  renderDigits(0);
  fetchTotal();
  setInterval(fetchTotal, AUTO_REFRESH_MS);
</script>

</body>
</html>
