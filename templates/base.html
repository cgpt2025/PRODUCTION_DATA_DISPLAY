<!doctype html>
<html lang="en" class="dark antialiased">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Production Monitor{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        .hover-scroll { overflow-y: auto; overflow-x: auto; scrollbar-width: thin; scrollbar-color: transparent transparent; transition: scrollbar-color 0.3s; }
        .hover-scroll:hover { scrollbar-color: #475569 transparent; }
        .hover-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .hover-scroll::-webkit-scrollbar-track { background: transparent; }
        .hover-scroll::-webkit-scrollbar-thumb { background: transparent; border-radius: 10px; transition: background-color 0.3s; }
        .hover-scroll:hover::-webkit-scrollbar-thumb { background: #475569; }

        #sidebar { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-x: hidden; }
        #sidebar.collapsed { width: 5rem !important; }
        #sidebar.collapsed .hide-on-collapse { opacity: 0; pointer-events: none; display: none; }
        #sidebar.collapsed .nav-item { justify-content: center; padding-left: 0; padding-right: 0; }
        #sidebar.collapsed .logo-container { padding-left: 0; padding-right: 0; justify-content: center; }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                        display: ['Outfit', 'sans-serif'], 
                    },
                    colors: {
                        obsidian: '#0B0E14',
                        panel: '#151924',
                        border: '#2A2F3D',
                        success: '#10B981',
                        warning: '#F59E0B',
                        primary: '#3B82F6'
                    },
                    animation: {
                        'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
                        'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
        
        if (localStorage.getItem('pd_theme') === 'light') document.documentElement.classList.remove('dark');
    </script>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 dark:bg-obsidian text-slate-800 dark:text-slate-200 min-h-screen flex selection:bg-primary/30">

    <aside id="sidebar" class="w-64 shrink-0 bg-white dark:bg-panel border-r border-slate-200 dark:border-border flex flex-col z-50">
        <div class="logo-container h-16 flex items-center px-6 border-b border-slate-200 dark:border-border whitespace-nowrap transition-all">
            <div class="w-8 h-8 rounded bg-primary flex items-center justify-center text-white shrink-0 shadow-lg shadow-primary/20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <div class="ml-3 hide-on-collapse transition-opacity duration-300">
                <div class="font-bold text-sm tracking-wide text-slate-900 dark:text-white">MTR PROD</div>
                <div class="text-[10px] uppercase tracking-widest text-slate-500 font-mono">Live Terminal</div>
            </div>
        </div>

        <nav class="flex-1 py-6 flex flex-col gap-2 px-3">
            <div class="hide-on-collapse text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 px-3">Views</div>
            
            <a href="{{ url_for('dashboard') }}" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg {% if page == 'dashboard' %}bg-primary/10 text-primary dark:text-blue-400{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50{% endif %} transition-colors group whitespace-nowrap" title="Dashboard">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="hide-on-collapse font-medium text-sm transition-opacity duration-300">Dashboard</span>
            </a>
            
            <a href="{{ url_for('filter_page') }}" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg {% if page == 'filter' %}bg-primary/10 text-primary dark:text-blue-400{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50{% endif %} transition-colors group whitespace-nowrap" title="Breakdown">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                <span class="hide-on-collapse font-medium text-sm transition-opacity duration-300">Breakdown</span>
            </a>

            <a href="{{ url_for('graph_page') }}" class="nav-item flex items-center gap-3 px-3 py-2.5 rounded-lg {% if page == 'graph' %}bg-primary/10 text-primary dark:text-blue-400{% else %}text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50{% endif %} transition-colors group whitespace-nowrap" title="Analytics">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path></svg>
                <span class="hide-on-collapse font-medium text-sm transition-opacity duration-300">Analytics</span>
            </a>
        </nav>

        <div class="p-4 border-t border-slate-200 dark:border-border">
            <a href="{{ url_for('logout') }}" class="nav-item flex items-center gap-3 px-3 py-2 text-slate-500 hover:text-red-500 transition-colors whitespace-nowrap" title="Logout">
                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                <span class="hide-on-collapse font-medium text-sm transition-opacity duration-300">Logout</span>
            </a>
        </div>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        
        <header class="h-16 bg-white/80 dark:bg-panel/80 backdrop-blur-md border-b border-slate-200 dark:border-border flex items-center justify-between px-6 sticky top-0 z-40">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="p-2 -ml-2 rounded-lg text-slate-500 hover:text-primary hover:bg-slate-100 dark:hover:bg-obsidian transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="flex items-center gap-2 bg-success/10 border border-success/20 px-3 py-1.5 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-success animate-pulse"></span>
                    <span class="text-xs font-mono font-bold text-success tracking-widest uppercase">Live</span>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <div class="font-mono text-xs bg-slate-100 dark:bg-obsidian border border-slate-200 dark:border-border px-3 py-1.5 rounded-md text-slate-600 dark:text-slate-400">
                    {{ today }}
                </div>
                
                <button onclick="toggleTheme()" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-obsidian transition-colors">
                    <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <main class="flex-1 p-6 hover-scroll animate-fade-in-up">
            {% block content %}{% endblock %}
        </main>
    </div>

    <div id="progress-bar" class="fixed top-0 left-0 h-[2px] bg-primary transition-all duration-300 w-0 z-50 shadow-[0_0_10px_rgba(59,130,246,0.8)]"></div>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.setItem('pd_theme', 'light');
            } else {
                html.classList.add('dark');
                localStorage.setItem('pd_theme', 'dark');
            }
        }
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('pd_sidebar', sidebar.classList.contains('collapsed') ? 'collapsed' : 'expanded');
        }
        if (localStorage.getItem('pd_sidebar') === 'collapsed') {
            document.getElementById('sidebar').classList.add('collapsed');
        }

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                const current = Math.floor(progress * (end - start) + start);
                obj.innerHTML = current.toLocaleString('en-IN');
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                } else {
                    obj.innerHTML = end.toLocaleString('en-IN');
                }
            };
            window.requestAnimationFrame(step);
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
